<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900" style="background:#0d0d1a;">

  <defs>
    <!-- Glow filters -->
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-center" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Orbit gradients -->
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

    <!-- Planet gradients -->
    <radialGradient id="p1" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#d97706"/></radialGradient>
    <radialGradient id="p2" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#059669"/></radialGradient>
    <radialGradient id="p3" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#1d4ed8"/></radialGradient>
    <radialGradient id="p4" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fca5a5"/><stop offset="100%" stop-color="#dc2626"/></radialGradient>
    <radialGradient id="p5" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="p6" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#ea580c"/></radialGradient>
    <radialGradient id="p7" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#a5f3fc"/><stop offset="100%" stop-color="#0891b2"/></radialGradient>
    <radialGradient id="p8" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#d9f99d"/><stop offset="100%" stop-color="#65a30d"/></radialGradient>
    <radialGradient id="p9" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fbcfe8"/><stop offset="100%" stop-color="#db2777"/></radialGradient>
    <radialGradient id="p10" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#e9d5ff"/><stop offset="100%" stop-color="#9333ea"/></radialGradient>
    <radialGradient id="p11" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fef08a"/><stop offset="100%" stop-color="#ca8a04"/></radialGradient>
    <radialGradient id="p12" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#bfdbfe"/><stop offset="100%" stop-color="#2563eb"/></radialGradient>
    <radialGradient id="p13" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#bbf7d0"/><stop offset="100%" stop-color="#16a34a"/></radialGradient>
    <radialGradient id="p14" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#b45309"/></radialGradient>
    <radialGradient id="p15" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#f0abfc"/><stop offset="100%" stop-color="#a21caf"/></radialGradient>
    <radialGradient id="p16" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#99f6e4"/><stop offset="100%" stop-color="#0d9488"/></radialGradient>
    <radialGradient id="p17" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#e0e7ff"/><stop offset="100%" stop-color="#4338ca"/></radialGradient>
    <radialGradient id="p18" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#fecaca"/><stop offset="100%" stop-color="#b91c1c"/></radialGradient>
    <radialGradient id="p19" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#d1fae5"/><stop offset="100%" stop-color="#047857"/></radialGradient>

    <!-- Stars background pattern -->
    <pattern id="stars" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="15" r="0.8" fill="white" opacity="0.6"/>
      <circle cx="45" cy="8" r="0.5" fill="white" opacity="0.4"/>
      <circle cx="78" cy="30" r="1" fill="white" opacity="0.7"/>
      <circle cx="22" cy="55" r="0.6" fill="white" opacity="0.5"/>
      <circle cx="60" cy="70" r="0.8" fill="white" opacity="0.6"/>
      <circle cx="90" cy="50" r="0.5" fill="white" opacity="0.3"/>
      <circle cx="35" cy="88" r="0.7" fill="white" opacity="0.5"/>
      <circle cx="82" cy="85" r="0.9" fill="white" opacity="0.4"/>
      <circle cx="5" cy="92" r="0.5" fill="white" opacity="0.6"/>
      <circle cx="55" cy="40" r="0.4" fill="white" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Starfield background -->
  <rect width="900" height="900" fill="url(#stars)"/>
  <rect width="900" height="900" fill="#0d0d1a" opacity="0.4"/>

  <!-- Extra scattered stars -->
  <circle cx="50" cy="50" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="820" cy="80" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="150" cy="820" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="750" cy="780" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="30" cy="450" r="1" fill="white" opacity="0.6"/>
  <circle cx="870" cy="450" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="200" cy="100" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="700" cy="150" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="100" cy="700" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="800" cy="700" r="1" fill="white" opacity="0.7"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="monospace" font-size="15" fill="#a78bfa" opacity="0.9" font-weight="bold">&gt; tech --solar-system</text>

  <!-- ═══════════════════════════════════ -->
  <!-- ORBIT RINGS (dashed, glowing)       -->
  <!-- ═══════════════════════════════════ -->

  <!-- Orbit 1 — r=105 — Languages (7 planets) -->
  <circle cx="450" cy="460" r="105" fill="none" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.4"/>
  <!-- Orbit 2 — r=195 — Frameworks (6 planets) -->
  <circle cx="450" cy="460" r="195" fill="none" stroke="#6d28d9" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.35"/>
  <!-- Orbit 3 — r=295 — Tools (7 planets) -->
  <circle cx="450" cy="460" r="295" fill="none" stroke="#5b21b6" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.3"/>

  <!-- Orbit labels -->
  <text x="560" y="360" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.5">LANGUAGES</text>
  <text x="650" y="272" font-family="monospace" font-size="9" fill="#8b5cf6" opacity="0.5">FRAMEWORKS</text>
  <text x="745" y="170" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.5">TOOLS</text>

  <!-- ═══════════════════════════════ -->
  <!-- CENTER STAR — "Ashutosh"        -->
  <!-- ═══════════════════════════════ -->
  <circle cx="450" cy="460" r="52" fill="#1e1b4b" filter="url(#glow-center)"/>
  <circle cx="450" cy="460" r="48" fill="url(#centerGrad)"/>
  <circle cx="450" cy="460" r="44" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>
  <text x="450" y="454" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">Ashutosh</text>
  <text x="450" y="470" text-anchor="middle" font-family="monospace" font-size="8" fill="#c4b5fd">Dev ✦</text>

  <!-- Pulse ring animation on center -->
  <circle cx="450" cy="460" r="52" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0">
    <animate attributeName="r" from="52" to="80" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.6" to="0" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ORBIT 1 — LANGUAGES — radius 105, center (450,460)        -->
  <!-- 7 planets, starting angles spread evenly ~51.4° apart     -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- Java — angle 0° → pos (555, 460) -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="0 450 460" to="360 450 460" dur="18s" repeatCount="indefinite" additive="sum"/>
    <circle cx="555" cy="460" r="18" fill="url(#p1)"/>
    <text x="555" y="464" text-anchor="middle" font-family="monospace" font-size="8.5" font-weight="bold" fill="#1a1a1a">Java</text>
  </g>

  <!-- C — angle 51° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="51 450 460" to="411 450 460" dur="18s" repeatCount="indefinite" additive="sum"/>
    <circle cx="555" cy="460" r="15" fill="url(#p3)"/>
    <text x="555" y="464" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">C</text>
  </g>

  <!-- Python — angle 102° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="102 450 460" to="462 450 460" dur="18s" repeatCount="indefinite" additive="sum"/>
    <circle cx="555" cy="460" r="17" fill="url(#p8)"/>
    <text x="555" y="464" text-anchor="middle" font-family="monospace" font-size="7.5" font-weight="bold" fill="#1a1a1a">Python</text>
  </g>

  <!-- HTML — angle 153° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="153 450 460" to="513 450 460" dur="18s" repeatCount="indefinite" additive="sum"/>
    <circle cx="555" cy="460" r="16" fill="url(#p4)"/>
    <text x="555" y="464" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">HTML</text>
  </g>

  <!-- CSS — angle 204° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="204 450 460" to="564 450 460" dur="18s" repeatCount="indefinite" additive="sum"/>
    <circle cx="555" cy="460" r="15" fill="url(#p3)"/>
    <text x="555" y="464" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">CSS</text>
  </g>

  <!-- JS — angle 255° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="255 450 460" to="615 450 460" dur="18s" repeatCount="indefinite" additive="sum"/>
    <circle cx="555" cy="460" r="17" fill="url(#p11)"/>
    <text x="555" y="464" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#1a1a1a">JS</text>
  </g>

  <!-- SQL — angle 306° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="306 450 460" to="666 450 460" dur="18s" repeatCount="indefinite" additive="sum"/>
    <circle cx="555" cy="460" r="15" fill="url(#p7)"/>
    <text x="555" y="464" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">SQL</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ORBIT 2 — FRAMEWORKS — radius 195, dur 32s                 -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Spring Boot — angle 0° → pos (645, 460) -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="0 450 460" to="360 450 460" dur="32s" repeatCount="indefinite" additive="sum"/>
    <circle cx="645" cy="460" r="20" fill="url(#p2)"/>
    <text x="645" y="457" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="#1a1a1a">Spring</text>
    <text x="645" y="467" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="#1a1a1a">Boot</text>
  </g>

  <!-- JSP — angle 60° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="60 450 460" to="420 450 460" dur="32s" repeatCount="indefinite" additive="sum"/>
    <circle cx="645" cy="460" r="16" fill="url(#p1)"/>
    <text x="645" y="464" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#1a1a1a">JSP</text>
  </g>

  <!-- Servlets — angle 120° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="120 450 460" to="480 450 460" dur="32s" repeatCount="indefinite" additive="sum"/>
    <circle cx="645" cy="460" r="19" fill="url(#p5)"/>
    <text x="645" y="457" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="white">Serv-</text>
    <text x="645" y="467" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="white">lets</text>
  </g>

  <!-- JDBC — angle 180° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="180 450 460" to="540 450 460" dur="32s" repeatCount="indefinite" additive="sum"/>
    <circle cx="645" cy="460" r="16" fill="url(#p6)"/>
    <text x="645" y="464" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">JDBC</text>
  </g>

  <!-- React — angle 240° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="240 450 460" to="600 450 460" dur="32s" repeatCount="indefinite" additive="sum"/>
    <circle cx="645" cy="460" r="20" fill="url(#p7)"/>
    <text x="645" y="464" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">React</text>
  </g>

  <!-- Node.js — angle 300° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="300 450 460" to="660 450 460" dur="32s" repeatCount="indefinite" additive="sum"/>
    <circle cx="645" cy="460" r="19" fill="url(#p2)"/>
    <text x="645" y="457" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="#1a1a1a">Node</text>
    <text x="645" y="467" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="#1a1a1a">.js</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ORBIT 3 — TOOLS — radius 295, dur 50s                      -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Git — angle 0° → pos (745, 460) -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="0 450 460" to="360 450 460" dur="50s" repeatCount="indefinite" additive="sum"/>
    <circle cx="745" cy="460" r="18" fill="url(#p4)"/>
    <text x="745" y="464" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="white">Git</text>
  </g>

  <!-- GitHub — angle ~51° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="51 450 460" to="411 450 460" dur="50s" repeatCount="indefinite" additive="sum"/>
    <circle cx="745" cy="460" r="18" fill="url(#p17)"/>
    <text x="745" y="464" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">GitHub</text>
  </g>

  <!-- VS Code — angle ~102° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="102 450 460" to="462 450 460" dur="50s" repeatCount="indefinite" additive="sum"/>
    <circle cx="745" cy="460" r="19" fill="url(#p3)"/>
    <text x="745" y="457" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="white">VS</text>
    <text x="745" y="467" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="white">Code</text>
  </g>

  <!-- Eclipse — angle ~153° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="153 450 460" to="513 450 460" dur="50s" repeatCount="indefinite" additive="sum"/>
    <circle cx="745" cy="460" r="18" fill="url(#p10)"/>
    <text x="745" y="464" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">Eclipse</text>
  </g>

  <!-- MySQL — angle ~204° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="204 450 460" to="564 450 460" dur="50s" repeatCount="indefinite" additive="sum"/>
    <circle cx="745" cy="460" r="18" fill="url(#p7)"/>
    <text x="745" y="464" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="white">MySQL</text>
  </g>

  <!-- MongoDB — angle ~255° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="255 450 460" to="615 450 460" dur="50s" repeatCount="indefinite" additive="sum"/>
    <circle cx="745" cy="460" r="19" fill="url(#p13)"/>
    <text x="745" y="464" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#1a1a1a">MongoDB</text>
  </g>

  <!-- Playwright — angle ~306° -->
  <g filter="url(#glow-soft)">
    <animateTransform attributeName="transform" type="rotate" from="306 450 460" to="666 450 460" dur="50s" repeatCount="indefinite" additive="sum"/>
    <circle cx="745" cy="460" r="20" fill="url(#p19)"/>
    <text x="745" y="457" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="#1a1a1a">Play-</text>
    <text x="745" y="467" text-anchor="middle" font-family="monospace" font-size="6.5" font-weight="bold" fill="#1a1a1a">wright</text>
  </g>

  <!-- Legend bottom -->
  <rect x="240" y="845" width="12" height="12" rx="6" fill="#fde68a"/>
  <text x="257" y="855" font-family="monospace" font-size="10" fill="#a78bfa">Languages</text>
  <rect x="360" y="845" width="12" height="12" rx="6" fill="#6ee7b7"/>
  <text x="377" y="855" font-family="monospace" font-size="10" fill="#a78bfa">Frameworks</text>
  <rect x="490" y="845" width="12" height="12" rx="6" fill="#fca5a5"/>
  <text x="507" y="855" font-family="monospace" font-size="10" fill="#a78bfa">Tools</text>

  <!-- Bottom credit -->
  <text x="450" y="878" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d28d9" opacity="0.6">✦ axhutosh · github.com/axhutosh ✦</text>

</svg>
